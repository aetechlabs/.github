name: 🐛 Bug Report
description: Report a bug or unexpected behavior in one of our projects.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Thank you for reporting a bug! 🐛
        Please fill out this form as completely as possible. The more detail you provide, the faster we can investigate and fix the issue.

        > 🔒 **Security issues?** Please do NOT use this form. See our [Security Policy](https://github.com/aetechlabs/.github/blob/main/SECURITY.md) instead.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checklist
      description: Please confirm the following before submitting.
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have read the relevant documentation and README.
          required: true
        - label: This is NOT a security vulnerability (I will use the security reporting process instead).
          required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I do X, Y happens instead of Z..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide a minimal, reliable set of steps to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Please provide your environment details.
      placeholder: |
        - OS: [e.g. Ubuntu 22.04, Windows 11, macOS 14]
        - Language/Runtime version: [e.g. Python 3.11, Node.js 20.x]
        - Project version/commit: [e.g. v1.2.3 or commit SHA]
        - Browser (if applicable): [e.g. Chrome 120]
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / Screenshots
      description: Paste any relevant log output or attach screenshots. This will be automatically formatted as code.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, links, or information that might help us investigate.
