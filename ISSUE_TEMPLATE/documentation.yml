name: 📖 Documentation Issue
description: Report missing, incorrect, or unclear documentation.
title: "[Docs]: "
labels: ["documentation", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Documentation Issue 📖
        Good documentation is as important as good code. Thank you for helping us improve!

  - type: dropdown
    id: doc_type
    attributes:
      label: Documentation Type
      options:
        - README
        - API Reference
        - Tutorial / Guide
        - Code Comments / Docstrings
        - Wiki
        - Changelog
        - Other
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location
      description: Where is the documentation issue? (file path, URL, or section name)
      placeholder: "e.g. docs/getting-started.md, README.md#installation"
    validations:
      required: true

  - type: dropdown
    id: issue_type
    attributes:
      label: Issue Type
      options:
        - Missing documentation
        - Incorrect / outdated information
        - Unclear or confusing explanation
        - Broken links
        - Typo / grammar
        - Missing code examples
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the documentation issue clearly.
    validations:
      required: true

  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Improvement
      description: How should the documentation be improved? You can paste suggested text here.

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a pull request to fix this documentation issue.
