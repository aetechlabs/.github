name: ✨ Feature Request
description: Suggest a new feature or enhancement for one of our projects.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Thanks for suggesting a feature! ✨
        We love hearing ideas from our community. Please fill out this form to help us understand your request clearly.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I have searched existing issues and this feature has not been requested before.
          required: true
        - label: I have checked the project roadmap (if available) and this is not already planned.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Describe the pain point or gap.
      placeholder: "I'm always frustrated when... / There's currently no way to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature or enhancement you'd like to see.
      placeholder: "I would like to be able to..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches or workarounds?

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Nice to have
        - Would significantly improve my workflow
        - Blocking — I cannot use the project effectively without this
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to implement this feature and submit a pull request.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, mockups, references, or examples here.
