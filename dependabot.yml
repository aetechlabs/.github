# Default Dependabot configuration for AETECH RESEARCH LABS LIMITED
# This file applies to the .github repository itself.
# Each individual repository should have its own dependabot.yml tailored to its stack.
#
# Documentation: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2

updates:
  # ─────────────────────────────────────────────
  # GitHub Actions
  # ─────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
    reviewers:
      - "aetechlabs/maintainers"
    groups:
      github-actions:
        patterns:
          - "*"

  # ─────────────────────────────────────────────
  # Python (pip) — for repos using pip
  # ─────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Ignore major version bumps for core ML libraries — review manually
      - dependency-name: "torch"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tensorflow"
        update-types: ["version-update:semver-major"]
    groups:
      python-dev-dependencies:
        dependency-type: "development"
        patterns:
          - "pytest*"
          - "ruff"
          - "black"
          - "mypy"
          - "isort"

  # ─────────────────────────────────────────────
  # Node.js (npm) — for repos using npm
  # ─────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
    groups:
      node-dev-dependencies:
        dependency-type: "development"
      node-prod-dependencies:
        dependency-type: "production"
